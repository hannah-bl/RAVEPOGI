<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero Dossier</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="hero.css">

</head>
<body>

<div class="overlay"></div>

<div class="container">

     <aside class="sidebar">

        <div class="logo">
            <img src="stark.png" alt="Stark Industries Logo">
            <span>J.A.R.V.I.S. v7.2.1</span>
        </div>

        <ul class="menu">
            <li class="active"><a href="home.html" class="menu-link">DASHBOARD</a></li>
            <li><a href="hero.html" class="menu-link">HERO DOSSIER</a></li>
            <li><a href="mission.html" class="menu-link">MISSION TIMELINE</a></li>
            <li><a href="games.html" class="menu-link">MINI GAMES</a></li>
            <li><a href="secret.html" class="menu-link">SECRET DATABASE</a></li>
        </ul>

        <div class="status-card">
            <h4>SYSTEM STATUS</h4>
            <p class="online">ONLINE</p>
            <div class="graph">
                <div class="graph-line"></div>
            </div>
            <span>98%</span>

        </div>

    </aside>


    <main class="main">

        <h1>HERO DOSSIER</h1>

        <div class="dossier-card">
            <div class="image-panel">
                <img src="hero.jpeg" alt="Hero">
            </div>

            <div class="info-panel">
                <div class="info-row">
                    <span>NAME</span>
                    <p>RAVE STARK</p>
                </div>

                <div class="info-row">
                    <span>CODENAME</span>
                    <p>IRON MAN</p>
                </div>

                <div class="info-row">
                    <span>BIRTHDAY</span>
                    <p>JUNE 15</p>
                </div>

                <div class="info-row">
                    <span>AGE</span>
                    <p>21</p>
                </div>

                <div class="info-row">
                    <span>POWER LEVEL</span>
                    <div class="power-bar">
                        <div class="power-fill"></div>
                    </div>
                    <small>98%</small>
                </div>

                <div class="status">
                    STATUS: LEGENDARY
                </div>

            </div>

        </div>

    </main>

</div>

</body>
</html>
