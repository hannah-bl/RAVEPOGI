<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Birthday Protocol</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="celebration.css">

</head>

<body>

<div class="container">

    <div class="protocol">

        ACTIVATING HOUSE PARTY PROTOCOL

    </div>

    <h1>

        HAPPY BIRTHDAY

    </h1>

    <h2>

        RAVE KO!

    </h2>

    <div class="candles">

        <div class="candle">

            <div class="flame"
            id="flame2"></div>

            <span>2</span>

        </div>

        <div class="candle">

            <div class="flame"
            id="flame1"></div>

            <span>1</span>

        </div>

    </div>

    <div class="cake">
        <img src="cake.png" alt="Cake Image">
    </div>

    <button id="blowBtn">

        BLOW

    </button>

    <div id="status">

        WISH STATUS:
        PENDING

    </div>

    <button id="dashboardBtn">

        RETURN TO DASHBOARD

    </button>

</div>

<script src="celebration.js"></script>

</body>
</html>
